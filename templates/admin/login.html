<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ system_name }} - 管理端登录</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", "SimSun", Arial, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 50%, #0d2137 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        
        .login-box {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.4);
            overflow: hidden;
        }
        
        .login-header {
            background: linear-gradient(180deg, #1a4a7a 0%, #0d3654 100%);
            color: #fff;
            padding: 30px 20px;
            text-align: center;
        }
        
        .login-header h1 {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        
        .login-header .subtitle {
            font-size: 13px;
            color: #a8c8e8;
        }
        
        .login-header .admin-badge {
            display: inline-block;
            background: #c9a84c;
            color: #1a1a2e;
            padding: 4px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 10px;
        }
        
        .login-body {
            padding: 30px 35px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #333;
            font-size: 14px;
        }
        
        .input-group-text {
            background: #f8f9fa;
            border-right: none;
        }
        
        .form-control {
            height: 42px;
            border-left: none;
            font-size: 15px;
        }
        
        .form-control:focus {
            border-color: #ced4da;
            box-shadow: none;
        }
        
        .btn-login {
            width: 100%;
            height: 45px;
            background: linear-gradient(180deg, #1a4a7a 0%, #0d3654 100%);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-login:hover {
            background: linear-gradient(180deg, #245a8a 0%, #1a4a6a 100%);
            transform: translateY(-1px);
        }
        
        .error-message {
            background: #fff5f5;
            border: 1px solid #fcc;
            color: #c00;
            padding: 12px 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .success-message {
            background: #f0fff4;
            border: 1px solid #c3e6cb;
            color: #28a745;
            padding: 12px 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .login-footer {
            text-align: center;
            padding: 15px 40px 25px;
            border-top: 1px solid #eee;
        }
        
        .login-footer a {
            color: #1a4a7a;
            text-decoration: none;
            font-size: 14px;
        }
        
        .login-footer a:hover {
            text-decoration: underline;
        }
        
        .info-text {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>{{ system_name }}</h1>
                <div class="subtitle">铁路客票管理系统</div>
                <div class="admin-badge"><i class="fas fa-shield-alt me-1"></i>管理端</div>
            </div>
            
            <div class="login-body">
                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div class="{{ 'error-message' if category == 'error' else 'success-message' }}">
                        <i class="fas {{ 'fa-exclamation-circle' if category == 'error' else 'fa-check-circle' }}"></i>
                        {{ message }}
                    </div>
                    {% endfor %}
                {% endif %}
                {% endwith %}
                
                <form method="POST" action="{{ url_for('admin_login') }}">
                    <div class="form-group">
                        <label for="username">管理员账号</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control" id="username" name="username" 
                                   placeholder="请输入管理员账号" required autofocus>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">密码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" 
                                   placeholder="请输入密码" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-login">
                        <i class="fas fa-sign-in-alt me-2"></i>登 录
                    </button>
                    
                    <div class="info-text">
                        <p>默认管理员: admin / admin123</p>
                    </div>
                </form>
            </div>
            
            <div class="login-footer">
                <a href="{{ url_for('login') }}"><i class="fas fa-arrow-left me-1"></i>返回售票端登录</a>
            </div>
        </div>
    </div>
</body>
</html>
