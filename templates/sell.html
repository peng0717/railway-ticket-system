<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>售票 - {{ system_name }}</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", Arial, sans-serif; background: linear-gradient(135deg, #0a1628, #1a3a5c, #0d2137); min-height: 100vh; color: #dde; }
        .top-bar { background: rgba(0,0,0,0.3); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #c9a84c; }
        .top-bar .title { color: #fff; font-size: 18px; font-weight: bold; }
        .top-bar .title i { color: #c9a84c; margin-right: 8px; }
        .top-bar a { color: #aab; text-decoration: none; }
        .top-bar a:hover { color: #fff; }
        .container { max-width: 700px; margin: 40px auto; padding: 0 20px; }
        .card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 30px; }
        .form-label { color: #aab; font-size: 13px; margin-bottom: 6px; }
        .form-control { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.15); color: #fff; border-radius: 8px; padding: 10px 14px; }
        .form-control:focus { border-color: #c9a84c; box-shadow: 0 0 0 0.2rem rgba(201,168,76,0.2); }
        .btn-sell { background: #2ecc71; border: none; color: #fff; padding: 10px 30px; border-radius: 8px; font-weight: bold; }
        .btn-sell:hover { background: #27ae60; }
        .btn-back { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #aab; padding: 10px 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="title"><i class="fas fa-ticket-alt"></i>售票</div>
        <a href="{{ url_for('main') }}"><i class="fas fa-arrow-left"></i> 返回工作台</a>
    </div>
    <div class="container">
        <div class="card">
            {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
            {% if success %}<div class="alert alert-success">{{ success }}</div>{% endif %}
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">车次号</label>
                    <input type="text" name="train_no" class="form-control" placeholder="例如：G101" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">出发日期</label>
                    <input type="date" name="date" class="form-control" required>
                </div>
                <div class="row mb-3">
                    <div class="col">
                        <label class="form-label">出发站</label>
                        <input type="text" name="from_station" class="form-control" placeholder="站名或代码" required>
                    </div>
                    <div class="col">
                        <label class="form-label">到达站</label>
                        <input type="text" name="to_station" class="form-control" placeholder="站名或代码" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">席别</label>
                    <select name="seat_type" class="form-control" required>
                        <option value="">请选择</option>
                        <option value="hard_seat">硬座</option>
                        <option value="hard_sleep">硬卧</option>
                        <option value="soft_sleep">软卧</option>
                        <option value="second_class">二等座</option>
                        <option value="first_class">一等座</option>
                        <option value="business">商务座</option>
                    </select>
                </div>
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-sell"><i class="fas fa-search"></i> 查询车票</button>
                    <a href="{{ url_for('main') }}" class="btn btn-back">返回</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
