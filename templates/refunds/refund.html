<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ system_name }} - 退票</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", "SimSun", Arial, sans-serif; background: #e8ecf0; font-size: 13px; }
        
        .header-bar { background: linear-gradient(180deg, #1a4a7a 0%, #0d3654 100%); color: #fff; padding: 8px 15px; display: flex; justify-content: space-between; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .station-name { font-size: 16px; font-weight: bold; }
        .header-info { font-size: 13px; color: #a8c8e8; }
        .header-right { display: flex; align-items: center; gap: 20px; }
        
        .menu-bar { background: #fff; border-bottom: 2px solid #1a4a7a; padding: 0; display: flex; }
        .menu-item { padding: 8px 18px; cursor: pointer; border-right: 1px solid #eee; font-size: 13px; }
        .menu-item:hover { background: #f0f5fa; }
        
        .main-content { padding: 20px; }
        
        .panel { background: #fff; border: 1px solid #ddd; border-radius: 3px; margin-bottom: 15px; }
        .panel-header { background: #f5f5f5; padding: 10px 15px; border-bottom: 1px solid #ddd; font-weight: bold; }
        .panel-body { padding: 15px; }
        
        .input-row { display: flex; margin-bottom: 15px; align-items: center; }
        .input-label { width: 100px; font-weight: bold; }
        .input-field { flex: 1; }
        .input-field input { height: 35px; border: 1px solid #ccc; border-radius: 2px; padding: 5px 10px; width: 300px; }
        
        .ticket-info { margin-top: 20px; }
        .info-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .info-item { display: flex; }
        .info-item .label { width: 80px; color: #666; }
        .info-item .value { font-weight: bold; color: #333; }
        
        .refund-calc { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 3px; }
        .refund-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #ddd; }
        .refund-row:last-child { border-bottom: none; }
        .refund-row.total { font-size: 18px; font-weight: bold; color: #1a4a7a; }
        
        .btn-group { display: flex; gap: 15px; margin-top: 20px; justify-content: center; }
        .btn { padding: 10px 30px; border: 1px solid #ccc; border-radius: 3px; cursor: pointer; font-size: 14px; background: #fff; }
        .btn.primary { background: #1a4a7a; color: #fff; border-color: #1a4a7a; }
        .btn:hover { opacity: 0.9; }
        
        .status-bar { background: #f5f5f5; border-top: 2px solid #1a4a7a; padding: 8px 15px; display: flex; justify-content: space-between; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-overlay.show { display: flex; }
        .modal-content { background: #fff; border-radius: 4px; padding: 20px; min-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .modal-header { background: #1a4a7a; color: #fff; padding: 10px 15px; margin: -20px -20px 15px -20px; border-radius: 4px 4px 0 0; }
    </style>
</head>
<body>
    <div class="header-bar">
        <div class="header-left">
            <span class="station-name">{{ station_name }}</span>
            <span class="header-info">{{ window_no }} {{ shift_name }}</span>
        </div>
        <div class="header-center">
            <span>现在处理 退票</span>
        </div>
        <div class="header-right">
            <span id="currentTime">{{ current_time }}</span>
        </div>
    </div>
    
    <div class="menu-bar">
        <div class="menu-item" onclick="window.location.href='/'">售票<span class="shortcut">[G]</span></div>
        <div class="menu-item" onclick="window.location.href='/refund'" style="background:#e8f4fc;">退票[R]</div>
        <div class="menu-item" onclick="window.location.href='/supplement'">到达补票</div>
        <div class="menu-item" onclick="window.location.href='/query'">余票查询</div>
        <div class="menu-item" onclick="window.location.href='/shift'">交班</div>
    </div>
    
    <div class="main-content">
        <div class="panel">
            <div class="panel-header">原票信息</div>
            <div class="panel-body">
                <div class="input-row">
                    <div class="input-label">票号:</div>
                    <div class="input-field">
                        <input type="text" id="ticketId" placeholder="输入21位票号或扫描二维码" onkeyup="searchTicket(event)">
                        <button class="btn" onclick="searchTicket()" style="margin-left:10px; padding:5px 15px;">读取</button>
                    </div>
                </div>
                
                <div id="ticketDetail" style="display:none;">
                    <div class="ticket-info">
                        <div class="info-grid">
                            <div class="info-item"><span class="label">票号:</span><span class="value" id="d_ticketId"></span></div>
                            <div class="info-item"><span class="label">状态:</span><span class="value" id="d_status"></span></div>
                            <div class="info-item"><span class="label">车次:</span><span class="value" id="d_trainNumber"></span></div>
                            <div class="info-item"><span class="label">日期:</span><span class="value" id="d_travelDate"></span></div>
                            <div class="info-item"><span class="label">开车时间:</span><span class="value" id="d_departureTime"></span></div>
                            <div class="info-item"><span class="label">区间:</span><span class="value" id="d_route"></span></div>
                            <div class="info-item"><span class="label">席别:</span><span class="value" id="d_seatType"></span></div>
                            <div class="info-item"><span class="label">票价:</span><span class="value" id="d_price"></span></div>
                        </div>
                    </div>
                    
                    <div class="refund-calc">
                        <div class="refund-row">
                            <span>退票原因:</span>
                            <select id="refundReason" onchange="calculateRefund()" style="height:30px; border:1px solid #ccc; border-radius:2px;">
                                <option value="15days">开车前15天以上（免收手续费）</option>
                                <option value="48hours">开车前48小时以上（收5%手续费）</option>
                                <option value="24hours">开车前24-48小时（收10%手续费）</option>
                                <option value="24hours_less">开车前24小时内（收20%手续费）</option>
                                <option value="after_departure">开车后（不办理退票）</option>
                            </select>
                        </div>
                        <div class="refund-row">
                            <span>票价:</span>
                            <span id="r_price">¥0.00</span>
                        </div>
                        <div class="refund-row">
                            <span>手续费:</span>
                            <span id="r_fee">¥0.00</span>
                        </div>
                        <div class="refund-row total">
                            <span>应退金额:</span>
                            <span id="r_amount">¥0.00</span>
                        </div>
                    </div>
                    
                    <div class="btn-group">
                        <button class="btn primary" onclick="confirmRefund()">确认退票[N]</button>
                        <button class="btn" onclick="window.location.href='/'">返回主界面[X]</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="status-bar">
        <span>退票[R] 返回主界面[X]</span>
    </div>
    
    <!-- 确认弹窗 -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-content">
            <div class="modal-header">
                <h4>确认退票</h4>
            </div>
            <div style="padding:20px; text-align:center;">
                <p style="margin-bottom:15px;">确定要为以下车票办理退票吗？</p>
                <div style="background:#f8f9fa; padding:15px; border-radius:3px; margin-bottom:20px;">
                    <div style="margin-bottom:8px;"><strong>票号:</strong> <span id="c_ticketId"></span></div>
                    <div style="margin-bottom:8px;"><strong>车次:</strong> <span id="c_trainNumber"></span></div>
                    <div style="margin-bottom:8px;"><strong>区间:</strong> <span id="c_route"></span></div>
                    <div style="font-size:18px; color:#1a4a7a;"><strong>应退金额:</strong> <span id="c_amount"></span></div>
                </div>
                <div class="btn-group">
                    <button class="btn primary" onclick="processRefund()">确认</button>
                    <button class="btn" onclick="closeModal()">取消</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 成功弹窗 -->
    <div class="modal-overlay" id="successModal">
        <div class="modal-content">
            <div class="modal-header">
                <h4>退票成功</h4>
            </div>
            <div style="padding:30px; text-align:center;">
                <div style="font-size:48px; color:#28a745; margin-bottom:15px;"><i class="fas fa-check-circle"></i></div>
                <p style="font-size:16px; margin-bottom:10px;">退票办理成功</p>
                <p>退款金额: <span id="s_amount" style="font-size:20px; font-weight:bold; color:#1a4a7a;"></span></p>
                <div class="btn-group" style="margin-top:25px;">
                    <button class="btn primary" onclick="closeModal(); resetForm();">继续办理退票</button>
                    <button class="btn" onclick="window.location.href='/'">返回主界面</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let currentTicket = null;
        
        document.addEventListener('DOMContentLoaded', function() {
            updateTime();
            setInterval(updateTime, 1000);
        });
        
        function updateTime() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + 
                           now.getMinutes().toString().padStart(2, '0') + ':' + 
                           now.getSeconds().toString().padStart(2, '0');
            document.getElementById('currentTime').textContent = timeStr;
        }
        
        async function searchTicket(e) {
            if (e && e.key !== 'Enter') return;
            
            const ticketId = document.getElementById('ticketId').value.trim();
            if (!ticketId) return;
            
            try {
                const response = await fetch('/api/tickets/' + encodeURIComponent(ticketId));
                const ticket = await response.json();
                
                if (ticket.error) {
                    alert('车票不存在');
                    return;
                }
                
                currentTicket = ticket;
                displayTicket(ticket);
                
            } catch (e) {
                alert('查询失败: ' + e.message);
            }
        }
        
        function displayTicket(ticket) {
            document.getElementById('d_ticketId').textContent = ticket.ticket_id;
            document.getElementById('d_status').textContent = ticket.status === 'valid' ? '有效' : ticket.status;
            document.getElementById('d_trainNumber').textContent = ticket.train_number;
            document.getElementById('d_travelDate').textContent = ticket.travel_date;
            document.getElementById('d_departureTime').textContent = ticket.departure_time;
            document.getElementById('d_route').textContent = ticket.from_station + ' -> ' + ticket.to_station;
            document.getElementById('d_seatType').textContent = ticket.seat_type;
            document.getElementById('d_price').textContent = '¥' + parseFloat(ticket.price).toFixed(2);
            
            document.getElementById('ticketDetail').style.display = 'block';
            calculateRefund();
        }
        
        function calculateRefund() {
            if (!currentTicket) return;
            
            const rates = {
                '15days': 0,
                '48hours': 0.05,
                '24hours': 0.10,
                '24hours_less': 0.20,
                'after_departure': 1.00
            };
            
            const reason = document.getElementById('refundReason').value;
            const price = parseFloat(currentTicket.price);
            const rate = rates[reason];
            
            const fee = price * rate;
            const amount = price - fee;
            
            document.getElementById('r_price').textContent = '¥' + price.toFixed(2);
            document.getElementById('r_fee').textContent = '¥' + fee.toFixed(2);
            document.getElementById('r_amount').textContent = '¥' + Math.max(0, amount).toFixed(2);
        }
        
        function confirmRefund() {
            if (!currentTicket) return;
            
            document.getElementById('c_ticketId').textContent = currentTicket.ticket_id;
            document.getElementById('c_trainNumber').textContent = currentTicket.train_number;
            document.getElementById('c_route').textContent = currentTicket.from_station + ' -> ' + currentTicket.to_station;
            document.getElementById('c_amount').textContent = document.getElementById('r_amount').textContent;
            
            document.getElementById('confirmModal').classList.add('show');
        }
        
        async function processRefund() {
            if (!currentTicket) return;
            
            try {
                const response = await fetch('/api/tickets/' + currentTicket.ticket_id + '/refund', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'}
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('s_amount').textContent = '¥' + data.refund.refund_amount.toFixed(2);
                    document.getElementById('confirmModal').classList.remove('show');
                    document.getElementById('successModal').classList.add('show');
                } else {
                    alert('退票失败: ' + data.error);
                }
                
            } catch (e) {
                alert('退票失败: ' + e.message);
            }
        }
        
        function closeModal() {
            document.getElementById('confirmModal').classList.remove('show');
            document.getElementById('successModal').classList.remove('show');
        }
        
        function resetForm() {
            document.getElementById('ticketId').value = '';
            document.getElementById('ticketDetail').style.display = 'none';
            currentTicket = null;
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'n' || e.key === 'N') {
                if (document.getElementById('ticketDetail').style.display !== 'none') {
                    confirmRefund();
                }
            }
            if (e.key === 'x' || e.key === 'X') {
                window.location.href = '/';
            }
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
