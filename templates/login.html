<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ system_name }} - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Consolas", "Microsoft YaHei", monospace;
            background: #0A1628;
            color: #E0E0E0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* 顶部状态栏 */
        .top-bar {
            background: #1B3A5C;
            border-bottom: 2px solid #3A5A7C;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .top-bar .system-name {
            color: #FFD700;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .top-bar .version {
            color: #B0C4DE;
            font-size: 12px;
        }
        /* 登录区域 */
        .login-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .login-box {
            background: #0D1B2A;
            border: 3px solid #3A5A7C;
            width: 100%;
            max-width: 420px;
        }
        .login-header {
            background: #1B3A5C;
            border-bottom: 2px solid #3A5A7C;
            padding: 15px 20px;
            text-align: center;
        }
        .login-header h1 {
            color: #FFD700;
            font-size: 18px;
            letter-spacing: 4px;
            margin-bottom: 5px;
        }
        .login-header .subtitle {
            color: #B0C4DE;
            font-size: 12px;
        }
        .login-body {
            padding: 25px 30px;
        }
        .input-row {
            display: flex;
            align-items: center;
            margin-bottom: 18px;
        }
        .input-row label {
            width: 80px;
            color: #FFD700;
            font-size: 14px;
        }
        .input-row input {
            flex: 1;
            background: #0A1628;
            border: 2px solid #3A5A7C;
            color: #FFD700;
            padding: 10px 12px;
            font-family: inherit;
            font-size: 16px;
            letter-spacing: 2px;
        }
        .input-row input:focus {
            outline: none;
            border-color: #FFD700;
        }
        .input-row input::placeholder {
            color: #4A6A8C;
            letter-spacing: 1px;
        }
        /* 验证码区域 */
        .captcha-row {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .captcha-row label {
            width: 80px;
            color: #FFD700;
            font-size: 14px;
        }
        .captcha-row input {
            width: 120px;
            background: #0A1628;
            border: 2px solid #3A5A7C;
            color: #FFD700;
            padding: 10px 12px;
            font-family: inherit;
            font-size: 16px;
            letter-spacing: 3px;
        }
        .captcha-row input:focus {
            outline: none;
            border-color: #FFD700;
        }
        .captcha-image {
            margin-left: 15px;
            border: 2px solid #3A5A7C;
        }
        .captcha-image img {
            display: block;
            height: 40px;
        }
        /* 错误提示 */
        .error-msg {
            background: #2A1A1A;
            border: 1px solid #FF4444;
            color: #FF4444;
            padding: 10px 15px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        /* 登录按钮 */
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #1B3A5C;
            border: 2px solid #B8860B;
            color: #FFD700;
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .login-btn:hover {
            background: #B8860B;
            color: #0A1628;
        }
        /* 底部信息 */
        .footer-bar {
            background: #1B3A5C;
            border-top: 2px solid #3A5A7C;
            padding: 10px 20px;
            text-align: center;
        }
        .footer-bar .copyright {
            color: #B0C4DE;
            font-size: 12px;
            letter-spacing: 1px;
        }
        .footer-bar .tip {
            color: #6B8299;
            font-size: 11px;
            margin-top: 3px;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <span class="system-name">铁路客票发售和预订系统</span>
        <span class="version">v5.0</span>
    </div>
    
    <div class="login-area">
        <div class="login-box">
            <div class="login-header">
                <h1>售票员登录</h1>
                <div class="subtitle">请输入工号和密码</div>
            </div>
            <div class="login-body">
                {% if error %}
                <div class="error-msg">{{ error }}</div>
                {% endif %}
                
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="input-row">
                        <label>工号:</label>
                        <input type="text" name="employee_no" placeholder="请输入工号" required autofocus value="{{ employee_no|default('') }}">
                    </div>
                    <div class="input-row">
                        <label>密码:</label>
                        <input type="password" name="password" placeholder="请输入密码" required>
                    </div>
                    <div class="input-row" style="display:none;">
                        <label>机器号:</label>
                        <input type="text" name="machine_code" value="M001">
                    </div>
                    <div class="captcha-row">
                        <label>验证码:</label>
                        <input type="text" name="captcha" placeholder="验证码" maxlength="4">
                        {% if captcha_image %}
                        <div class="captcha-image">
                            <img src="{{ captcha_image }}" alt="验证码">
                        </div>
                        {% endif %}
                    </div>
                    <button type="submit" class="login-btn">[ 确 认 登 录 ]</button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="footer-bar">
        <div class="copyright">铁路客票发售和预订系统总体组</div>
        <div class="tip">请使用本人工号登录，操作记录将自动保存</div>
    </div>
</body>
</html>
