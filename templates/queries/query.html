<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ system_name }} - 余票查询</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", "SimSun", Arial, sans-serif; background: #e8ecf0; font-size: 13px; }
        
        .header-bar { background: linear-gradient(180deg, #1a4a7a 0%, #0d3654 100%); color: #fff; padding: 8px 15px; display: flex; justify-content: space-between; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .station-name { font-size: 16px; font-weight: bold; }
        .header-info { font-size: 13px; color: #a8c8e8; }
        .header-right { display: flex; align-items: center; gap: 20px; }
        
        .menu-bar { background: #fff; border-bottom: 2px solid #1a4a7a; padding: 0; display: flex; }
        .menu-item { padding: 8px 18px; cursor: pointer; border-right: 1px solid #eee; font-size: 13px; }
        .menu-item:hover { background: #f0f5fa; }
        
        .main-content { padding: 20px; }
        
        .panel { background: #fff; border: 1px solid #ddd; border-radius: 3px; margin-bottom: 15px; }
        .panel-header { background: #f5f5f5; padding: 10px 15px; border-bottom: 1px solid #ddd; font-weight: bold; }
        .panel-body { padding: 15px; }
        
        .query-type { display: flex; gap: 20px; margin-bottom: 20px; }
        .type-btn { padding: 8px 20px; border: 1px solid #ccc; border-radius: 3px; cursor: pointer; background: #fff; }
        .type-btn.active { background: #1a4a7a; color: #fff; border-color: #1a4a7a; }
        
        .input-row { display: flex; margin-bottom: 15px; align-items: center; flex-wrap: wrap; gap: 10px; }
        .input-label { font-weight: bold; width: 80px; }
        .input-field input { height: 32px; border: 1px solid #ccc; border-radius: 2px; padding: 5px 10px; width: 150px; }
        
        .btn { padding: 8px 20px; border: 1px solid #ccc; border-radius: 3px; cursor: pointer; background: #fff; }
        .btn.primary { background: #1a4a7a; color: #fff; border-color: #1a4a7a; }
        .btn:hover { opacity: 0.9; }
        
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 15px; }
        th { background: #e8f4fc; padding: 10px 8px; text-align: center; border: 1px solid #ddd; }
        td { padding: 8px; text-align: center; border: 1px solid #eee; }
        tr:hover { background: #f8f9fa; }
        
        .status-bar { background: #f5f5f5; border-top: 2px solid #1a4a7a; padding: 8px 15px; }
        
        .station-input-wrapper { position: relative; display: inline-block; }
        .station-suggestions { position: absolute; top: 100%; left: 0; background: #fff; border: 1px solid #1a4a7a; border-radius: 2px; max-height: 200px; overflow-y: auto; z-index: 1000; width: 250px; display: none; box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
        .station-suggestions.show { display: block; }
        .station-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #eee; }
        .station-item:hover { background: #e8f4fc; }
        
        .result-info { padding: 10px 15px; background: #f8f9fa; border-radius: 3px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="header-bar">
        <div class="header-left">
            <span class="station-name">{{ station_name }}</span>
            <span class="header-info">{{ window_no }} {{ shift_name }}</span>
        </div>
        <div class="header-center">
            <span>现在查询 余票查询</span>
        </div>
        <div class="header-right">
            <span id="currentTime">{{ current_time }}</span>
        </div>
    </div>
    
    <div class="menu-bar">
        <div class="menu-item" onclick="window.location.href='/'">售票<span class="shortcut">[G]</span></div>
        <div class="menu-item" onclick="window.location.href='/refund'">退票[R]</div>
        <div class="menu-item" onclick="window.location.href='/supplement'">到达补票</div>
        <div class="menu-item" onclick="window.location.href='/query'" style="background:#e8f4fc;">余票查询[U]</div>
        <div class="menu-item" onclick="window.location.href='/shift'">交班</div>
    </div>
    
    <div class="main-content">
        <div class="panel">
            <div class="panel-header">查询条件</div>
            <div class="panel-body">
                <div class="query-type">
                    <button class="type-btn active" onclick="setQueryType('train', this)">按车次查询[C]</button>
                    <button class="type-btn" onclick="setQueryType('station', this)">按发到站查询[S]</button>
                </div>
                
                <div id="trainQuery">
                    <div class="input-row">
                        <div class="input-label">日期:</div>
                        <div class="input-field">
                            <input type="date" id="queryDate">
                        </div>
                        <div class="input-label">车次:</div>
                        <div class="input-field">
                            <input type="text" id="queryTrainNumber" placeholder="输入车次">
                        </div>
                        <button class="btn primary" onclick="queryByTrain()">查询</button>
                    </div>
                </div>
                
                <div id="stationQuery" style="display:none;">
                    <div class="input-row">
                        <div class="input-label">日期:</div>
                        <div class="input-field">
                            <input type="date" id="queryDate2">
                        </div>
                        <div class="input-label">发站:</div>
                        <div class="input-field">
                            <div class="station-input-wrapper">
                                <input type="text" id="queryFromStation" placeholder="输入拼音码" oninput="searchStation(this, 'from')">
                                <div class="station-suggestions" id="fromSuggestions"></div>
                            </div>
                        </div>
                        <div class="input-label">到站:</div>
                        <div class="input-field">
                            <div class="station-input-wrapper">
                                <input type="text" id="queryToStation" placeholder="输入拼音码" oninput="searchStation(this, 'to')">
                                <div class="station-suggestions" id="toSuggestions"></div>
                            </div>
                        </div>
                        <button class="btn primary" onclick="queryByStation()">查询</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="panel">
            <div class="panel-header">查询结果</div>
            <div class="panel-body">
                <div id="resultArea">
                    <div style="text-align:center; color:#999; padding:50px;">
                        请输入查询条件
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="status-bar">
        <span>查询[U] 按车次[C] 按到站[S] 返回主界面[X]</span>
    </div>
    
    <script>
        let queryType = 'train';
        
        document.addEventListener('DOMContentLoaded', function() {
            updateTime();
            setInterval(updateTime, 1000);
            document.getElementById('queryDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('queryDate2').value = new Date().toISOString().split('T')[0];
        });
        
        function updateTime() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + 
                           now.getMinutes().toString().padStart(2, '0') + ':' + 
                           now.getSeconds().toString().padStart(2, '0');
            document.getElementById('currentTime').textContent = timeStr;
        }
        
        function setQueryType(type, btn) {
            queryType = type;
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            document.getElementById('trainQuery').style.display = type === 'train' ? 'block' : 'none';
            document.getElementById('stationQuery').style.display = type === 'station' ? 'block' : 'none';
        }
        
        async function queryByTrain() {
            const trainNumber = document.getElementById('queryTrainNumber').value.trim();
            if (!trainNumber) {
                alert('请输入车次');
                return;
            }
            
            try {
                const response = await fetch('/api/trains/search?from=&to=');
                const trains = await response.json();
                
                const filtered = trains.filter(t => t.train_number.toUpperCase().includes(trainNumber.toUpperCase()));
                
                if (filtered.length === 0) {
                    document.getElementById('resultArea').innerHTML = '<div style="text-align:center; color:#999; padding:50px;">未找到相关车次</div>';
                    return;
                }
                
                // 显示车次列表的余票信息
                let html = '';
                for (const train of filtered) {
                    const availResponse = await fetch(`/api/trains/${train.train_id}/availability?from=${train.start_station}&to=${train.end_station}`);
                    const avail = await availResponse.json();
                    
                    if (avail.error) continue;
                    
                    html += `
                    <div class="result-info">
                        <strong>${avail.train_number}</strong> ${avail.train_type} 
                        ${avail.departure_time} - ${avail.arrival_time}
                        ${train.start_station} -> ${train.end_station}
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>席别</th>
                                <th>余票</th>
                                <th>票价(元)</th>
                            </tr>
                        </thead>
                        <tbody>
                    `;
                    
                    for (const [name, info] of Object.entries(avail.prices)) {
                        html += `
                            <tr>
                                <td>${name}</td>
                                <td>${info.count}</td>
                                <td>${info.price}</td>
                            </tr>
                        `;
                    }
                    
                    html += '</tbody></table>';
                }
                
                document.getElementById('resultArea').innerHTML = html;
                
            } catch (e) {
                alert('查询失败: ' + e.message);
            }
        }
        
        async function queryByStation() {
            const fromStation = document.getElementById('queryFromStation').value.trim();
            const toStation = document.getElementById('queryToStation').value.trim();
            
            if (!fromStation || !toStation) {
                alert('请输入发站和到站');
                return;
            }
            
            try {
                const response = await fetch('/api/trains/search?from=' + fromStation + '&to=' + toStation);
                const trains = await response.json();
                
                if (trains.length === 0) {
                    document.getElementById('resultArea').innerHTML = '<div style="text-align:center; color:#999; padding:50px;">未找到相关车次</div>';
                    return;
                }
                
                let html = `
                    <div class="result-info">
                        <strong>查询结果:</strong> ${fromStation} -> ${toStation} 
                        共找到 <strong>${trains.length}</strong> 个车次
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>车次</th>
                                <th>类型</th>
                                <th>开车时间</th>
                                <th>到达时间</th>
                                <th>商务座</th>
                                <th>一等座</th>
                                <th>二等座</th>
                                <th>硬座</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                for (const train of trains) {
                    const availResponse = await fetch(`/api/trains/${train.train_id}/availability?from=${fromStation}&to=${toStation}`);
                    const avail = await availResponse.json();
                    
                    if (avail.error) continue;
                    
                    html += `
                        <tr>
                            <td><strong>${avail.train_number}</strong></td>
                            <td>${avail.train_type}</td>
                            <td>${avail.departure_time}</td>
                            <td>${avail.arrival_time}</td>
                            <td>${avail.prices['商务座']?.count || '-'}</td>
                            <td>${avail.prices['一等座']?.count || '-'}</td>
                            <td>${avail.prices['二等座']?.count || '-'}</td>
                            <td>${avail.prices['硬座']?.count || '-'}</td>
                        </tr>
                    `;
                }
                
                html += '</tbody></table>';
                document.getElementById('resultArea').innerHTML = html;
                
            } catch (e) {
                alert('查询失败: ' + e.message);
            }
        }
        
        async function searchStation(input, type) {
            const query = input.value.trim();
            const suggestions = document.getElementById(type + 'Suggestions');
            
            if (query.length < 1) {
                suggestions.classList.remove('show');
                return;
            }
            
            try {
                const response = await fetch('/api/stations/search?q=' + encodeURIComponent(query));
                const stations = await response.json();
                
                if (stations.length === 0) {
                    suggestions.classList.remove('show');
                    return;
                }
                
                suggestions.innerHTML = stations.map(s => 
                    `<div class="station-item" onclick="selectStation('${type}', '${s.code}', this)">
                        ${s.name} (${s.code})
                    </div>`
                ).join('');
                
                suggestions.classList.add('show');
            } catch (e) {}
        }
        
        function selectStation(type, code, el) {
            document.getElementById(type + 'Station').value = code;
            document.getElementById(type + 'Suggestions').classList.remove('show');
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'x' || e.key === 'X') window.location.href = '/';
            if (e.key === 'c' || e.key === 'C') setQueryType('train', document.querySelectorAll('.type-btn')[0]);
            if (e.key === 's' || e.key === 'S') setQueryType('station', document.querySelectorAll('.type-btn')[1]);
        });
    </script>
</body>
</html>
