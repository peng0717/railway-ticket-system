<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查询 - {{ system_name }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Consolas", "Microsoft YaHei", monospace;
            background: #1B3A5C;
            color: #FFFFFF;
            min-height: 100vh;
            overflow: hidden;
        }
        /* 顶部状态栏 */
        .top-bar {
            background: #0D2137;
            border-bottom: 2px solid #3A5A7C;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .top-bar .status-info {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .top-bar .station { color: #FFD700; font-weight: bold; }
        .top-bar .divider { color: #6B8299; }
        .top-bar .window { color: #FFFFFF; }
        .top-bar .employee { color: #B0C4DE; }
        .top-bar .time { color: #FFD700; font-size: 14px; }
        /* 主内容区 */
        .main-container {
            display: flex;
            height: calc(100vh - 85px);
        }
        /* 左侧查询面板 */
        .input-panel {
            width: 400px;
            background: #0D2137;
            border-right: 2px solid #3A5A7C;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }
        .panel-title {
            background: #1B3A5C;
            border: 2px solid #3A5A7C;
            padding: 10px 15px;
            font-size: 14px;
            text-align: center;
            color: #FFD700;
            margin-bottom: 15px;
        }
        /* Tab切换 */
        .tab-switch {
            display: flex;
            margin-bottom: 15px;
            border: 2px solid #3A5A7C;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: #0D2137;
            border: none;
            color: #B0C4DE;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
        }
        .tab-btn:first-child { border-right: 2px solid #3A5A7C; }
        .tab-btn.active {
            background: #FFD700;
            color: #0D2137;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        /* 输入组 */
        .input-group {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }
        .input-group label {
            width: 90px;
            font-size: 13px;
            color: #FFD700;
        }
        .input-group label span.key {
            color: #FFFFFF;
            margin-right: 5px;
        }
        .input-group input {
            flex: 1;
            background: #0F2B45;
            border: 2px solid #3A5A7C;
            color: #FFFFFF;
            padding: 10px 12px;
            font-family: inherit;
            font-size: 14px;
        }
        .input-group input:focus {
            outline: none;
            border-color: #FFD700;
        }
        .input-group input::placeholder { color: #6B8299; }
        /* 车站下拉 */
        .station-dropdown {
            position: relative;
            flex: 1;
        }
        .station-dropdown input {
            width: 100%;
        }
        .station-dropdown .dropdown-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #0D2137;
            border: 2px solid #FFD700;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }
        .station-dropdown .dropdown-list.show { display: block; }
        .station-dropdown .dropdown-item {
            padding: 10px 12px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid #1B3A5C;
        }
        .station-dropdown .dropdown-item:hover { background: #1B3A5C; }
        .station-dropdown .dropdown-item .name { color: #FFFFFF; }
        .station-dropdown .dropdown-item .code { color: #6B8299; font-size: 11px; margin-left: 10px; }
        /* 操作按钮 */
        .action-buttons {
            margin-top: auto;
            display: flex;
            gap: 10px;
        }
        .action-btn {
            flex: 1;
            padding: 12px;
            background: #1B3A5C;
            border: 2px solid #3A5A7C;
            color: #FFFFFF;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            text-align: center;
        }
        .action-btn:hover { border-color: #FFD700; color: #FFD700; }
        .action-btn.primary {
            background: #FFD700;
            color: #0D2137;
            border-color: #FFD700;
        }
        /* 右侧结果面板 */
        .result-panel {
            flex: 1;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }
        .result-box {
            background: #0D2137;
            border: 2px solid #3A5A7C;
            padding: 15px;
        }
        .result-box-title {
            color: #FFD700;
            font-size: 14px;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #3A5A7C;
        }
        /* 车次表格 */
        .train-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .train-table th {
            background: #1B3A5C;
            color: #FFD700;
            padding: 10px 8px;
            text-align: left;
            border-bottom: 2px solid #3A5A7C;
        }
        .train-table td {
            padding: 10px 8px;
            border-bottom: 1px solid #1B3A5C;
            color: #FFFFFF;
        }
        .train-table tr:hover td {
            background: #0F2B45;
        }
        .train-table .train-num { color: #FFD700; font-weight: bold; }
        .train-table .time { color: #FFFFFF; }
        .train-table .duration { color: #B0C4DE; }
        /* 空状态 */
        .empty-state {
            color: #6B8299;
            text-align: center;
            padding: 40px 20px;
        }
        /* 票价表格 */
        .price-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 10px;
        }
        .price-table th {
            background: #1B3A5C;
            color: #FFD700;
            padding: 8px;
            text-align: center;
            border: 1px solid #3A5A7C;
        }
        .price-table td {
            padding: 8px;
            text-align: center;
            border: 1px solid #3A5A7C;
            color: #FFFFFF;
        }
        .price-table td.price { color: #FFD700; font-weight: bold; }
        /* 底部功能栏 */
        .bottom-bar {
            background: #0D2137;
            border-top: 2px solid #3A5A7C;
            padding: 8px 20px;
            display: flex;
            justify-content: center;
            gap: 25px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
        }
        .bottom-bar .func-hint { color: #6B8299; font-size: 12px; }
        .bottom-bar .func-hint kbd { 
            background: #1B3A5C; 
            border: 1px solid #3A5A7C; 
            color: #FFD700; 
            padding: 2px 6px; 
            margin-right: 5px; 
        }
    </style>
</head>
<body>
    <!-- 顶部状态栏 -->
    <div class="top-bar">
        <div class="status-info">
            <span class="station">{{ session.get('station_name', '北京站') }}</span>
            <span class="divider">|</span>
            <span class="window">窗口{{ session.get('window_no', '1') }}</span>
            <span class="divider">|</span>
            <span class="employee">工号:{{ session.get('employee_no', '') }} {{ session.get('user_name', '') }}</span>
        </div>
        <div class="time" id="current-time">--:--:--</div>
    </div>

    <!-- 主内容区 -->
    <div class="main-container">
        <!-- 左侧输入面板 -->
        <div class="input-panel">
            <div class="panel-title">◇ 查询条件</div>
            
            <!-- Tab切换 -->
            <div class="tab-switch">
                <button class="tab-btn active" data-tab="by-train">按车次</button>
                <button class="tab-btn" data-tab="by-station">按发到站</button>
            </div>
            
            <!-- 按车次查询 -->
            <div class="tab-content active" id="tab-by-train">
                <div class="input-group">
                    <label><span class="key">[F1]</span>车次:</label>
                    <input type="text" id="query-train-no" placeholder="输入车次号 如G1" maxlength="10">
                </div>
            </div>
            
            <!-- 按发到站查询 -->
            <div class="tab-content" id="tab-by-station">
                <div class="input-group">
                    <label><span class="key">[F2]</span>发站:</label>
                    <div class="station-dropdown">
                        <input type="text" id="query-from-station" placeholder="输入拼音码" maxlength="10">
                        <div class="dropdown-list" id="from-station-list"></div>
                    </div>
                </div>
                <div class="input-group">
                    <label><span class="key">[F3]</span>到站:</label>
                    <div class="station-dropdown">
                        <input type="text" id="query-to-station" placeholder="输入拼音码" maxlength="10">
                        <div class="dropdown-list" id="to-station-list"></div>
                    </div>
                </div>
            </div>
            
            <div class="action-buttons">
                <button class="action-btn primary" id="query-btn">[Enter] 查询</button>
                <button class="action-btn" id="reset-btn">[F6] 重置</button>
            </div>
        </div>

        <!-- 右侧结果面板 -->
        <div class="result-panel">
            <!-- 车次列表 -->
            <div class="result-box">
                <div class="result-box-title">◇ 查询结果</div>
                <div id="result-content">
                    <div class="empty-state">
                        请输入查询条件
                    </div>
                </div>
            </div>

            <!-- 详细信息 -->
            <div class="result-box hidden" id="detail-box">
                <div class="result-box-title">◇ 详细信息</div>
                <div id="detail-content"></div>
            </div>
        </div>
    </div>

    <!-- 底部功能键栏 -->
    <div class="bottom-bar">
        <span class="func-hint"><kbd>F1</kbd>车次</span>
        <span class="func-hint"><kbd>F2</kbd>发站</span>
        <span class="func-hint"><kbd>F3</kbd>到站</span>
        <span class="func-hint"><kbd>F6</kbd>重置</span>
        <span class="func-hint"><kbd>Enter</kbd>查询</span>
        <span class="func-hint"><kbd>ESC</kbd>返回</span>
    </div>

    <script>
        // DOM元素
        const trainNoInput = document.getElementById('query-train-no');
        const fromStationInput = document.getElementById('query-from-station');
        const toStationInput = document.getElementById('query-to-station');
        const queryBtn = document.getElementById('query-btn');
        const resetBtn = document.getElementById('reset-btn');
        const resultContent = document.getElementById('result-content');
        const detailBox = document.getElementById('detail-box');
        const detailContent = document.getElementById('detail-content');

        let currentTab = 'by-train';
        let selectedTrainId = null;

        // 初始化
        function init() {
            updateTime();
            setInterval(updateTime, 1000);

            // Tab切换
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => switchTab(btn.dataset.tab));
            });

            trainNoInput.addEventListener('keydown', e => {
                if (e.key === 'Enter') performQuery();
            });

            fromStationInput.addEventListener('input', () => handleStationInput('from'));
            toStationInput.addEventListener('input', () => handleStationInput('to'));
            fromStationInput.addEventListener('focus', () => handleStationInput('from')());
            toStationInput.addEventListener('focus', () => handleStationInput('to')());

            queryBtn.addEventListener('click', performQuery);
            resetBtn.addEventListener('click', resetForm);
        }

        // 更新时间
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
            }).replace(/\//g, '-');
            document.getElementById('current-time').textContent = timeStr;
        }

        // Tab切换
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
            
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');

            if (tab === 'by-train') trainNoInput.focus();
            else fromStationInput.focus();
        }

        // 车站输入处理
        function handleStationInput(type) {
            return function() {
                const input = type === 'from' ? fromStationInput : toStationInput;
                const value = input.value.trim().toUpperCase();
                const list = document.getElementById(type + '-station-list');
                
                if (value.length < 1) {
                    list.classList.remove('show');
                    return;
                }

                fetch(`/api/search-stations?q=${encodeURIComponent(value)}`)
                    .then(r => r.json())
                    .then(data => {
                        if (data.status === 'success' && data.data.length > 0) {
                            list.innerHTML = data.data.slice(0, 8).map(s => `
                                <div class="dropdown-item" data-code="${s.code}" data-name="${s.name}" onclick="selectQueryStation('${type}', '${s.code}', '${s.name}')">
                                    <span class="name">${s.name}</span>
                                    <span class="code">${s.code}</span>
                                </div>
                            `).join('');
                            list.classList.add('show');
                        } else {
                            list.classList.remove('show');
                        }
                    });
            };
        }

        // 选择车站
        window.selectQueryStation = function(type, code, name) {
            const input = type === 'from' ? fromStationInput : toStationInput;
            input.value = name;
            input.dataset.code = code;
            
            const list = document.getElementById(type + '-station-list');
            list.classList.remove('show');

            // 聚焦到下一输入框
            if (type === 'from') toStationInput.focus();
        };

        // 执行查询
        function performQuery() {
            if (currentTab === 'by-train') {
                const trainNo = trainNoInput.value.trim().toUpperCase();
                if (!trainNo) {
                    alert('请输入车次号');
                    return;
                }
                searchByTrain(trainNo);
            } else {
                const fromCode = fromStationInput.dataset.code;
                const toCode = toStationInput.dataset.code;
                if (!fromCode || !toCode) {
                    alert('请选择发站和到站');
                    return;
                }
                searchByStation(fromCode, toCode, fromStationInput.value, toStationInput.value);
            }
        }

        // 按车次查询
        function searchByTrain(trainNo) {
            fetch(`/api/search-trains?q=${encodeURIComponent(trainNo)}`)
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success' && data.data.length > 0) {
                        displayTrainResults(data.data);
                    } else {
                        resultContent.innerHTML = '<div class="empty-state">未找到该车次</div>';
                        detailBox.classList.add('hidden');
                    }
                });
        }

        // 按发到站查询
        function searchByStation(fromCode, toCode, fromName, toName) {
            fetch(`/api/search-trains?from=${encodeURIComponent(fromCode)}&to=${encodeURIComponent(toCode)}`)
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success' && data.data.length > 0) {
                        displayTrainResults(data.data, fromName, toName);
                    } else {
                        resultContent.innerHTML = '<div class="empty-state">未找到经过该区间的车次</div>';
                        detailBox.classList.add('hidden');
                    }
                });
        }

        // 显示车次结果
        function displayTrainResults(trains, fromName = null, toName = null) {
            const now = new Date();
            
            resultContent.innerHTML = `
                <table class="train-table">
                    <thead>
                        <tr>
                            <th>车次</th>
                            <th>类型</th>
                            <th>发站</th>
                            <th>发时</th>
                            <th>到站</th>
                            <th>到时</th>
                            <th>历时</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${trains.map(t => {
                            const start = t.start_time || '--:--';
                            const end = t.end_time || '--:--';
                            let duration = '';
                            try {
                                const s = new Date(`2000/01/01 ${start}`);
                                const e = new Date(`2000/01/01 ${end}`);
                                let diff = (e - s) / 1000 / 60;
                                if (diff < 0) diff += 24 * 60;
                                duration = `${Math.floor(diff/60)}小时${diff%60}分`;
                            } catch {}
                            
                            return `
                                <tr>
                                    <td class="train-num">${t.train_number}</td>
                                    <td>${t.train_type || '高速'}</td>
                                    <td>${fromName || t.start_station}</td>
                                    <td class="time">${start}</td>
                                    <td>${toName || t.end_station}</td>
                                    <td class="time">${end}</td>
                                    <td class="duration">${duration}</td>
                                    <td><a href="#" onclick="showTrainDetail(${t.train_id}, '${t.train_number}'); return false;">详情</a></td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        }

        // 显示车次详情
        window.showTrainDetail = function(trainId, trainNumber) {
            selectedTrainId = trainId;
            
            // 获取经停站和票价
            fetch(`/api/train-detail?train_id=${encodeURIComponent(trainId)}`)
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success') {
                        displayTrainDetail(data.data);
                    }
                });
        };

        // 显示详情
        function displayTrainDetail(data) {
            const train = data;
            const stops = data.stops || [];
            const prices = data.prices || {};

            const seatNames = {
                'business': '商务座',
                'first': '一等座',
                'second': '二等座',
                'soft_seat': '软座',
                'hard_seat': '硬座',
                'soft_sleeper': '软卧',
                'hard_sleeper': '硬卧'
            };

            let stopsHtml = stops.map((s, i) => `
                <tr>
                    <td>${s.stop_sequence || (i+1)}</td>
                    <td>${s.station_name || s.station_code}</td>
                    <td>${s.arrival_time || '--:--'}</td>
                    <td>${s.departure_time || '--:--'}</td>
                </tr>
            `).join('');

            let pricesHtml = '';
            const seatList = ['business', 'first', 'second', 'soft_seat', 'hard_seat', 'soft_sleeper', 'hard_sleeper'];
            seatList.forEach(key => {
                if (prices[key]) {
                    pricesHtml += `<td class="price">¥${prices[key]}</td>`;
                } else {
                    pricesHtml += `<td>--</td>`;
                }
            });

            detailContent.innerHTML = `
                <div style="margin-bottom: 15px;">
                    <span style="color: #FFD700; font-size: 18px; font-weight: bold;">${train.train_number}</span>
                    <span style="margin-left: 20px; color: #B0C4DE;">${train.train_type || '高速动车'}</span>
                    <span style="margin-left: 20px;">${train.start_station} → ${train.end_station}</span>
                </div>
                
                <table class="train-table" style="margin-bottom: 15px;">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>站名</th>
                            <th>到达</th>
                            <th>出发</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${stopsHtml}
                    </tbody>
                </table>

                <div style="color: #FFD700; margin-bottom: 10px;">参考票价</div>
                <table class="price-table">
                    <thead>
                        <tr>
                            <th>商务座</th>
                            <th>一等座</th>
                            <th>二等座</th>
                            <th>软座</th>
                            <th>硬座</th>
                            <th>软卧</th>
                            <th>硬卧</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            ${pricesHtml}
                        </tr>
                    </tbody>
                </table>
            `;

            detailBox.classList.remove('hidden');
        }

        // 重置
        function resetForm() {
            trainNoInput.value = '';
            fromStationInput.value = '';
            toStationInput.value = '';
            delete fromStationInput.dataset.code;
            delete toStationInput.dataset.code;
            
            resultContent.innerHTML = '<div class="empty-state">请输入查询条件</div>';
            detailBox.classList.add('hidden');
            selectedTrainId = null;

            trainNoInput.focus();
        }

        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (e.key.startsWith('F') && e.key.length === 2) {
                e.preventDefault();
            }

            if (e.key === 'F1') { switchTab('by-train'); trainNoInput.focus(); }
            if (e.key === 'F2') { switchTab('by-station'); fromStationInput.focus(); }
            if (e.key === 'F3') { switchTab('by-station'); toStationInput.focus(); }
            if (e.key === 'F6') { resetForm(); }
            if (e.key === 'Escape') { window.location.href = '/main'; }
        });

        // 点击其他地方关闭下拉
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.station-dropdown')) {
                document.querySelectorAll('.dropdown-list').forEach(l => l.classList.remove('show'));
            }
        });

        // 初始化
        init();
    </script>
</body>
</html>
