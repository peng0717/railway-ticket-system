<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班次选定 - {{ system_name }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Consolas", "Microsoft YaHei", monospace;
            background: #0A1628;
            color: #E0E0E0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* 顶部状态栏 */
        .top-bar {
            background: #1B3A5C;
            border-bottom: 2px solid #3A5A7C;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .top-bar .system-name {
            color: #FFD700;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        /* 主内容区 */
        .main-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .shift-box {
            background: #0D1B2A;
            border: 3px solid #3A5A7C;
            width: 100%;
            max-width: 500px;
        }
        .box-header {
            background: #1B3A5C;
            border-bottom: 2px solid #3A5A7C;
            padding: 15px 20px;
            text-align: center;
        }
        .box-header h1 {
            color: #FFD700;
            font-size: 18px;
            letter-spacing: 4px;
            margin-bottom: 5px;
        }
        .box-header .subtitle {
            color: #B0C4DE;
            font-size: 12px;
        }
        .box-body {
            padding: 25px 30px;
        }
        /* 信息行 */
        .info-row {
            display: flex;
            border-bottom: 1px solid #2A4A6C;
            padding: 10px 0;
        }
        .info-row:last-of-type {
            border-bottom: none;
        }
        .info-label {
            width: 100px;
            color: #FFD700;
            font-size: 14px;
        }
        .info-value {
            flex: 1;
            color: #FFFFFF;
            font-size: 14px;
        }
        /* 班次选择区 */
        .shift-select-area {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid #3A5A7C;
        }
        .select-title {
            color: #FFD700;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .shift-options {
            display: flex;
            gap: 15px;
        }
        .shift-option {
            flex: 1;
            background: #0A1628;
            border: 2px solid #3A5A7C;
            padding: 20px 15px;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }
        .shift-option:hover {
            border-color: #B8860B;
        }
        .shift-option.selected {
            background: #1B3A5C;
            border-color: #FFD700;
        }
        .shift-option .shift-key {
            color: #FFD700;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .shift-option .shift-name {
            color: #FFFFFF;
            font-size: 16px;
            margin-bottom: 5px;
        }
        .shift-option .shift-time {
            color: #B0C4DE;
            font-size: 12px;
        }
        .shift-option .shift-desc {
            color: #6B8299;
            font-size: 11px;
            margin-top: 8px;
        }
        /* 操作按钮 */
        .action-row {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        .action-btn {
            flex: 1;
            padding: 12px 20px;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-confirm {
            background: #1B3A5C;
            border: 2px solid #B8860B;
            color: #FFD700;
        }
        .btn-confirm:hover {
            background: #B8860B;
            color: #0A1628;
        }
        .btn-cancel {
            background: transparent;
            border: 2px solid #3A5A7C;
            color: #B0C4DE;
        }
        .btn-cancel:hover {
            border-color: #FF4444;
            color: #FF4444;
        }
        /* 底部信息 */
        .footer-bar {
            background: #1B3A5C;
            border-top: 2px solid #3A5A7C;
            padding: 10px 20px;
            text-align: center;
        }
        .footer-bar .tip {
            color: #B0C4DE;
            font-size: 12px;
        }
        .footer-bar .shortcut {
            color: #6B8299;
            font-size: 11px;
            margin-top: 3px;
        }
        /* 隐藏的表单 */
        form { display: none; }
    </style>
</head>
<body>
    <div class="top-bar">
        <span class="system-name">铁路客票发售和预订系统</span>
        <span style="color:#B0C4DE;font-size:12px;">{{ system_name }}</span>
    </div>
    
    <div class="main-area">
        <div class="shift-box">
            <div class="box-header">
                <h1>班 次 选 择</h1>
                <div class="subtitle">请选择上班班次类型</div>
            </div>
            <div class="box-body">
                <div class="info-row">
                    <div class="info-label">工号:</div>
                    <div class="info-value">{{ session.get('employee_no', 'N/A') }}</div>
                </div>
                <div class="info-row">
                    <div class="info-label">姓名:</div>
                    <div class="info-value">{{ session.get('user_name', 'N/A') }}</div>
                </div>
                <div class="info-row">
                    <div class="info-label">当前时间:</div>
                    <div class="info-value" id="current-time">--:--:--</div>
                </div>
                
                <form id="shift-form" method="POST" action="{{ url_for('shift_select') }}">
                    <input type="hidden" name="shift_type" id="shift_type" value="{{ default_shift }}">
                </form>
                
                <div class="shift-select-area">
                    <div class="select-title">选择班次类型:</div>
                    <div class="shift-options">
                        <div class="shift-option {% if default_shift == 'day' %}selected{% endif %}" data-value="day" onclick="selectShift(this)">
                            <div class="shift-key">[ 1 ]</div>
                            <div class="shift-name">白班</div>
                            <div class="shift-time">08:00 - 20:00</div>
                            <div class="shift-desc">日间售票窗口</div>
                        </div>
                        <div class="shift-option {% if default_shift == 'night' %}selected{% endif %}" data-value="night" onclick="selectShift(this)">
                            <div class="shift-key">[ 2 ]</div>
                            <div class="shift-name">夜班</div>
                            <div class="shift-time">20:00 - 08:00</div>
                            <div class="shift-desc">夜间售票窗口</div>
                        </div>
                    </div>
                </div>
                
                <div class="action-row">
                    <button class="action-btn btn-confirm" onclick="confirmShift()">[ 确 认 进 入 ]</button>
                    <button class="action-btn btn-cancel" onclick="logout()">[ 退 出 ]</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="footer-bar">
        <div class="tip">请选择当前班次类型后确认进入工作台</div>
        <div class="shortcut">快捷键: 1=白班 2=夜班 Enter=确认 Esc=退出</div>
    </div>
    
    <script>
        // 更新当前时间
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', {hour12: false});
            document.getElementById('current-time').textContent = timeStr;
        }
        updateTime();
        setInterval(updateTime, 1000);
        
        // 选择班次
        function selectShift(el) {
            document.querySelectorAll('.shift-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            el.classList.add('selected');
            document.getElementById('shift_type').value = el.dataset.value;
        }
        
        // 确认班次
        function confirmShift() {
            document.getElementById('shift-form').submit();
        }
        
        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                window.location.href = '{{ url_for("login") }}';
            }
        }
        
        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (e.key === '1') {
                selectShift(document.querySelector('[data-value="day"]'));
            } else if (e.key === '2') {
                selectShift(document.querySelector('[data-value="night"]'));
            } else if (e.key === 'Enter') {
                confirmShift();
            } else if (e.key === 'Escape') {
                logout();
            }
        });
    </script>
</body>
</html>
